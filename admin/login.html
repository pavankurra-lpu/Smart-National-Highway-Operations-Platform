<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNHOP Admin Secure Login</title>
    <!-- Use same global styles for baseline -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body class="admin-login-body">

    <div class="glass-panel" style="width: 100%; max-width: 400px; text-align: center; border-color: var(--border);">
        <i class="fa-solid fa-building-shield fa-3x" style="color: var(--primary); margin-bottom: 20px;"></i>
        <h2 style="margin-bottom: 10px; color: #fff;">AUTHORIZED PERSONNEL ONLY</h2>
        <p style="font-size: 12px; margin-bottom: 30px;">SNHOP Operations Control Room</p>

        <form id="login-form" class="flex-col gap-4">
            <div style="text-align: left;">
                <label style="font-size: 11px; color: var(--text-sec); font-weight: bold;">STAFF ID</label>
                <input type="text" id="admin-id" placeholder="admin@nhai" required autocomplete="off">
            </div>
            
            <div style="text-align: left;">
                <label style="font-size: 11px; color: var(--text-sec); font-weight: bold;">PASSCODE</label>
                <input type="password" id="admin-pass" placeholder="NHAI@2026" required autocomplete="off">
            </div>

            <p id="login-error" style="color: var(--accent-red); font-size: 12px; height: 14px; margin: 0;"></p>

            <button type="submit" class="btn btn-primary w-full" style="justify-content: center; padding: 15px;">
                <i class="fa-solid fa-lock-open"></i> AUTHENTICATE
            </button>
        </form>

        <div style="margin-top: 30px; font-size: 10px; color: var(--text-sec);">
            <p>Authorized Personnel Only - Refer to Internal Documentation for access.</p>
        </div>
        <a href="../index.html" style="display:inline-block; margin-top: 15px; font-size: 12px; color: var(--text-sec); text-decoration: none;">← Back to Gateway</a>
    </div>

    <!-- Scripts -->
    <script src="../js/shared/auth.js"></script>
    <script src="../js/admin/login.js"></script>
</body>
</html>
